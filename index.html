<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<title>😎擺攤老大😎</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css?v=1.1">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="theme-color" content="#1976d2">
</head>

<body>

<div class="topbar">

<button onclick="clearDay()">日結清空</button>

<button onclick="showVersion()">版本資訊</button>

<button onclick="exportCSV()">匯出日營收</button>
  
</div>

<div class="container">

<div class="orders">

<h2>出餐區</h2>

<table>

<thead>

<tr>
<th>號碼</th>
<th>訂單內容</th>
<th>總金額</th>
<th>已出餐</th>
</tr>

</thead>

<tbody id="orderList"></tbody>

</table>

</div>

<div class="account">

<div class="completed">

<h2>已完成訂單</h2>

<div id="completedList"></div>

</div>

<div class="stats">

<h2>品項統計</h2>

<div class="statsRow">

<div id="stats"></div>

<canvas id="salesChart"></canvas>

</div>

</div>

</div>

</div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal" id="orderModal">

<div class="modalContent">

<h2>新增訂單</h2>

<div id="menuItems"></div>

<button onclick="createOrder()">完成</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js?v=1.1"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

<!-- 版本資訊 Modal -->
<div id="versionModal" class="modal">

<div class="modalContent">

<h2>版本資訊</h2>

<div id="versionInfo"></div>

<br>

<button onclick="closeVersion()">關閉</button>

</div>

</div>

</body>
</html>
